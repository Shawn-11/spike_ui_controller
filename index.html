<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPIKE Remote</title>
<style>
  :root{
    --bg: #12151a;
    --panel: #1b2028;
    --panel-2: #20262f;
    --line: #2a313d;
    --text: #e8edf4;
    --dim: #7d8a9a;
    --cyan: #3ad6e8;
    --amber: #ffc94d;
    --green: #3ddc84;
    --red: #ff5c5c;
    font-family: 'Space Mono', ui-monospace, 'Courier New', monospace;
  }
  @font-face{
    font-family:'Space Mono';
    src: local('Space Mono');
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg); color: var(--text);
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body{
    display:flex; flex-direction:column;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height:100dvh;
  }

  header{
    padding: 6px 10px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel), var(--bg));
    flex-shrink: 0;
  }
  .title-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  h1{
    font-family:'Space Mono', monospace;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    margin:0; color: var(--dim); font-weight:700;
  }
  h1 span{ color: var(--cyan); }

  #connectBtn{
    font-family: inherit; font-weight:700; font-size: 12px;
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--text); cursor:pointer;
  }
  #connectBtn.connected{ border-color: var(--green); color: var(--green); }
  #connectBtn:active{ transform: scale(0.97); }

  .status-row{
    display:flex; align-items:center; gap:10px; margin-top:6px;
  }
  #statusText{
    font-size: 17px; font-weight: 800; letter-spacing: 0.2px;
    color: var(--text);
  }

  .battery{ display:flex; align-items:center; gap:5px; margin-left:auto; }
  .battery-cells{ display:flex; gap:1px; }
  .cell{
    width: 4px; height: 9px; border-radius:1px;
    background: var(--line); border: 1px solid #384252;
  }
  .cell.lit{ background: var(--green); border-color: var(--green); }
  .cell.lit.mid{ background: var(--amber); border-color: var(--amber); }
  .cell.lit.low{ background: var(--red); border-color: var(--red); }
  #battPct{ font-size: 10px; color: var(--dim); min-width: 26px; }

  main{
    flex:1; min-height:0; padding: 8px 10px 4px; display:flex; flex-direction:column; gap:8px;
  }

  .section-label{
    font-family:'Space Mono', monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 5px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after{ content:''; flex:1; height:1px; background: var(--line); }

  /* ---- Arms: compact, sits on top ---- */
  #armsSection{ flex-shrink: 0; }
  #armsSection .pad-row{ display:flex; gap: 8px; }
  .pad.arm{
    flex:1; background: var(--panel);
    border: 1px solid var(--line); border-radius: 10px;
    display:flex; flex-direction:column; align-items:center;
    padding: 6px 8px;
  }
  .arm .pad-label{
    font-family:'Space Mono', monospace; font-size: 10px;
    color: var(--amber); letter-spacing: 1px; margin-bottom: 4px; font-weight:700;
  }
  .arm .arrow-btn{
    height: 34px; margin-bottom: 5px; border-radius: 8px;
  }
  .arm .arrow-btn:last-child{ margin-bottom: 0; }
  .arm .arrow-btn svg{ width:16px; height:16px; }

  /* ---- Drive: huge, anchored to the bottom for thumb reach ---- */
  #driveSection{
    flex: 1; min-height: 0;
    display:flex; flex-direction:column;
  }
  #driveSection .pad-row{ flex:1; display:flex; gap: 10px; min-height:0; }
  .pad.drive{
    flex:1; background: var(--panel);
    border: 1px solid var(--line); border-radius: 20px;
    display:flex; flex-direction:column; align-items:stretch;
    padding: 8px; gap: 8px;
  }
  .drive .pad-label{
    font-family:'Space Mono', monospace; font-size: 12px;
    color: var(--cyan); letter-spacing: 1.5px; font-weight:700;
    text-align:center;
  }
  .drive .arrow-btn{
    flex:1; border-radius: 16px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  }
  .drive .arrow-btn .btn-label{
    font-family:'Space Mono', monospace; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; font-weight:700; color: var(--dim);
  }
  .drive .arrow-btn.active .btn-label{ color:#0b1116; }
  .arm .arrow-btn .btn-label{ display:none; }

  /* ---- Shared button base ---- */
  .arrow-btn{
    width: 100%; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--text);
    user-select:none; cursor:pointer;
    transition: background 0.08s, transform 0.06s, box-shadow 0.08s;
  }
  .arrow-btn svg{ pointer-events:none; }
  .arrow-btn:active{ transform: scale(0.96); }

  .arrow-btn.active{
    background: var(--cyan);
    transform: scale(0.97);
    box-shadow: 0 0 16px 2px rgba(58,214,232,0.75), 0 0 36px rgba(58,214,232,0.35);
  }
  .arrow-btn.active svg path{ fill:#0b1116; }
  .arm .arrow-btn.active{
    background: var(--amber);
    box-shadow: 0 0 12px 2px rgba(255,201,77,0.75), 0 0 28px rgba(255,201,77,0.35);
  }

  footer{
    border-top: 1px solid var(--line);
    background: var(--panel);
    padding: 6px 12px;
    font-family:'Space Mono', monospace; font-size: 10px;
    color: var(--green);
    height: 48px; flex-shrink:0; overflow: hidden; display:flex; flex-direction:column-reverse;
  }
  footer .line{ opacity:0.9; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
  footer .line.dim{ color: var(--dim); }
  .cursor{ display:inline-block; width:6px; height:11px; background: var(--green); margin-left:4px; animation: blink 1s step-end infinite; vertical-align: -1px; }
  @keyframes blink{ 50%{ opacity:0; } }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>SPIKE <span>REMOTE</span></h1>
    <button id="connectBtn">Connect</button>
  </div>
  <div class="status-row">
    <div id="statusText">🔴 Disconnected</div>
    <div class="battery">
      <div class="battery-cells" id="battCells"></div>
      <div id="battPct">--%</div>
    </div>
  </div>
</header>

<main>
  <div id="armsSection">
    <div class="section-label">Arms</div>
    <div class="pad-row">
      <div class="pad arm" data-motor="C">
        <div class="pad-label">C</div>
        <button class="arrow-btn" data-action="F"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4 L20 16 L4 16 Z" fill="#e8edf4"/></svg></button>
        <button class="arrow-btn" data-action="R"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 20 L4 8 L20 8 Z" fill="#e8edf4"/></svg></button>
      </div>
      <div class="pad arm" data-motor="D">
        <div class="pad-label">D</div>
        <button class="arrow-btn" data-action="F"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4 L20 16 L4 16 Z" fill="#e8edf4"/></svg></button>
        <button class="arrow-btn" data-action="R"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 20 L4 8 L20 8 Z" fill="#e8edf4"/></svg></button>
      </div>
    </div>
  </div>

  <div id="driveSection">
    <div class="section-label">Drive</div>
    <div class="pad-row">
      <div class="pad drive" data-motor="E">
        <div class="pad-label">MOTOR E</div>
        <button class="arrow-btn" data-action="F">
          <svg width="34" height="34" viewBox="0 0 24 24"><path d="M12 4 L20 16 L4 16 Z" fill="#e8edf4"/></svg>
          <span class="btn-label">Forward</span>
        </button>
        <button class="arrow-btn" data-action="R">
          <svg width="34" height="34" viewBox="0 0 24 24"><path d="M12 20 L4 8 L20 8 Z" fill="#e8edf4"/></svg>
          <span class="btn-label">Reverse</span>
        </button>
      </div>
      <div class="pad drive" data-motor="F">
        <div class="pad-label">MOTOR F</div>
        <button class="arrow-btn" data-action="F">
          <svg width="34" height="34" viewBox="0 0 24 24"><path d="M12 4 L20 16 L4 16 Z" fill="#e8edf4"/></svg>
          <span class="btn-label">Forward</span>
        </button>
        <button class="arrow-btn" data-action="R">
          <svg width="34" height="34" viewBox="0 0 24 24"><path d="M12 20 L4 8 L20 8 Z" fill="#e8edf4"/></svg>
          <span class="btn-label">Reverse</span>
        </button>
      </div>
    </div>
  </div>
</main>

<footer id="log"></footer>

<script>
const SERVICE_UUID = 'c5f50001-8280-46da-89f4-6d8051e4aeef';
const CHAR_UUID = 'c5f50002-8280-46da-89f4-6d8051e4aeef';

let device = null;
let characteristic = null;
const holds = new Map(); // element -> stop function, for the visibility-change safety net

function logLine(text, dim=false){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'line' + (dim ? ' dim' : '');
  line.textContent = '> ' + text;
  el.prepend(line);
  while(el.children.length > 4) el.removeChild(el.lastChild);
}

function setStatus(state){
  const text = document.getElementById('statusText');
  text.textContent = state === 'running' ? '🟢 Connected'
                    : state === 'connected' ? '🟡 Waiting'
                    : '🔴 Disconnected';
  text.title = state === 'running' ? 'Program running on hub'
             : state === 'connected' ? 'BLE linked — press the hub button to start the program'
             : 'Not connected';
}

function setBattery(pct){
  document.getElementById('battPct').textContent = pct + '%';
  const cellsEl = document.getElementById('battCells');
  cellsEl.innerHTML = '';
  const totalCells = 10;
  const lit = Math.round((pct/100) * totalCells);
  for(let i=0;i<totalCells;i++){
    const c = document.createElement('div');
    c.className = 'cell';
    if(i < lit){
      c.classList.add('lit');
      if(pct < 20) c.classList.add('low');
      else if(pct < 50) c.classList.add('mid');
    }
    cellsEl.appendChild(c);
  }
}
setBattery(0);

function onNotify(event){
  const value = event.target.value;
  const bytes = new Uint8Array(value.buffer);
  if(bytes[0] !== 0x01) return; // only "write stdout" events matter here
  const payload = new TextDecoder().decode(bytes.slice(1));
  if(payload === 'RDY'){
    setStatus('running');
    logLine('Program started on hub');
  } else if(payload[0] === 'B' && payload.length === 4){
    const pct = parseInt(payload.slice(1), 10);
    if(!isNaN(pct)) setBattery(pct);
  } else {
    logLine(payload, true);
  }
}

function onDisconnected(){
  characteristic = null;
  setStatus('disconnected');
  document.getElementById('connectBtn').textContent = 'Connect';
  document.getElementById('connectBtn').classList.remove('connected');
  logLine('Hub disconnected');
}

async function connect(){
  try{
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    device.addEventListener('gattserverdisconnected', onDisconnected);
    logLine('Connecting...');
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);
    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', onNotify);
    setStatus('connected');
    document.getElementById('connectBtn').textContent = 'Connected';
    document.getElementById('connectBtn').classList.add('connected');
    logLine('BLE link up');
  } catch(err){
    logLine('Connect failed: ' + err.message, true);
  }
}

async function sendCommand(motorId, action){
  if(!characteristic) return;
  const payload = new Uint8Array([0x06, motorId.charCodeAt(0), action.charCodeAt(0)]);
  try{
    await characteristic.writeValueWithResponse(payload);
  } catch(err){
    logLine('Write failed: ' + err.message, true);
  }
}

// Sends stop for E, F, C, D together in ONE BLE write so they land in the
// same packet and get processed in the same hub loop tick — this avoids
// the small stagger you get from four separate awaited GATT writes.
async function sendStopAll(){
  if(!characteristic) return;
  const payload = new Uint8Array([
    0x06,
    'E'.charCodeAt(0), 'S'.charCodeAt(0),
    'F'.charCodeAt(0), 'S'.charCodeAt(0),
    'C'.charCodeAt(0), 'S'.charCodeAt(0),
    'D'.charCodeAt(0), 'S'.charCodeAt(0)
  ]);
  try{
    await characteristic.writeValueWithResponse(payload);
  } catch(err){
    logLine('Write failed: ' + err.message, true);
  }
}

function bindHold(el, motorId, action){
  let interval = null;
  const start = (e) => {
    e.preventDefault();
    if(!characteristic){ logLine('Connect first', true); return; }
    sendCommand(motorId, action);
    interval = setInterval(() => sendCommand(motorId, action), 250);
    el.classList.add('active');
    holds.set(el, stop);
  };
  const stop = () => {
    if(interval){ clearInterval(interval); interval = null; }
    if(characteristic) sendStopAll();
    el.classList.remove('active');
    holds.delete(el);
  };
  el.addEventListener('pointerdown', start);
  el.addEventListener('pointerup', stop);
  el.addEventListener('pointercancel', stop);
  el.addEventListener('pointerleave', stop);
  el.addEventListener('contextmenu', (e) => e.preventDefault());
}

document.querySelectorAll('.pad').forEach(pad => {
  const motorId = pad.dataset.motor;
  pad.querySelectorAll('.arrow-btn').forEach(btn => {
    bindHold(btn, motorId, btn.dataset.action);
  });
});

// Safety net: if the tab is backgrounded mid-hold, stop everything.
document.addEventListener('visibilitychange', () => {
  if(document.hidden){
    holds.forEach(stopFn => stopFn());
  }
});

document.getElementById('connectBtn').addEventListener('click', () => {
  if(!navigator.bluetooth){
    logLine('Web Bluetooth unsupported — use Chrome/Edge (Android) or Bluefy (iOS)', true);
    return;
  }
  connect();
});

logLine('Ready. Tap Connect.', true);
</script>
</body>
</html>
